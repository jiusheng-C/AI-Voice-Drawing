services:
  mysql:
    image: mysql:8.4
    container_name: ai-voice-drawing-mysql
    environment:
      MYSQL_DATABASE: voice_drawing
      MYSQL_USER: voice
      MYSQL_PASSWORD: voice
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
